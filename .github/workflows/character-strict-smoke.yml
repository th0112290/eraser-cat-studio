name: Character Strict Smoke

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/character-strict-smoke.yml"
      - "apps/api/**"
      - "apps/worker/**"
      - "packages/db/**"
      - "packages/image-gen/**"
      - "packages/shared/**"
      - "packages/render-orchestrator/**"
      - "packages/audio/**"
      - "packages/analytics/**"
      - "packages/ops/**"
      - "packages/publish/**"
      - "packages/story/**"
      - "scripts/smokeCharacter.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

jobs:
  smoke-character-strict:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DATABASE_URL: postgresql://app:app@127.0.0.1:5432/eraser?schema=public
      REDIS_URL: redis://127.0.0.1:6379
      S3_ENDPOINT: http://127.0.0.1:9000
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio_password
      S3_BUCKET: artifacts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start infra
        run: pnpm docker:up

      - name: Run DB migrations
        run: |
          pnpm -C packages/db migrate:deploy
          pnpm -C packages/db generate

      - name: Start API and Worker
        shell: bash
        run: |
          pnpm -C apps/api run dev > api.log 2>&1 &
          echo $! > api.pid
          pnpm -C apps/worker run dev > worker.log 2>&1 &
          echo $! > worker.pid

      - name: Wait for API health
        shell: bash
        run: |
          for i in {1..90}; do
            if curl -fsS http://localhost:3000/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "API did not become healthy in time"
          exit 1

      - name: Run strict character smoke
        env:
          SMOKE_TIMEOUT_MS: "900000"
        run: pnpm smoke:character:strict

      - name: Package smoke (shared/audio/render/analytics)
        run: |
          pnpm -C packages/shared run smoke:stableStringify
          pnpm -C packages/audio run audio:smoke
          pnpm -C packages/render-orchestrator run render:smoke
          pnpm -C packages/analytics run analytics:smoke

      - name: Upload runtime logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: character-strict-smoke-logs-${{ github.run_id }}-${{ github.sha }}
          path: |
            api.log
            worker.log
            docs/branch-protection-character-strict.md
            out/smoke_e2e_last.json
            out/**/generation_manifest.json
          if-no-files-found: ignore

      - name: Stop API and Worker
        if: always()
        shell: bash
        run: |
          if [ -f api.pid ]; then kill "$(cat api.pid)" || true; fi
          if [ -f worker.pid ]; then kill "$(cat worker.pid)" || true; fi

      - name: Stop infra
        if: always()
        run: pnpm docker:down
