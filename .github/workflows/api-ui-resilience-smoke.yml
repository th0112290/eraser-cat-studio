name: API UI Resilience Smoke

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/api-ui-resilience-smoke.yml"
      - "apps/api/**"
      - "packages/shared/**"
      - "packages/audio/**"
      - "packages/render-orchestrator/**"
      - "packages/analytics/**"
      - "packages/ops/**"
      - "packages/publish/**"
      - "packages/story/**"
      - "scripts/smokeUiRoutes.mjs"
      - "scripts/smokeUiVisualContract.mjs"
      - "scripts/captureUiSnapshots.mjs"
      - "docs/ui-smoke-checklist.md"
      - "docs/gpu-runner-ops.md"
      - "docs/rollout-failure-runbook.md"
      - "package.json"
      - "pnpm-lock.yaml"
  workflow_dispatch:

jobs:
  api-ui-resilience:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      DATABASE_URL: postgresql://app:app@127.0.0.1:5432/eraser?schema=public
      REDIS_URL: redis://127.0.0.1:6379
      S3_ENDPOINT: http://127.0.0.1:9000
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio_password
      S3_BUCKET: artifacts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Typecheck API
        run: pnpm -C apps/api exec tsc -p tsconfig.json --noEmit

      - name: Typecheck Worker
        run: pnpm -C apps/worker exec tsc -p tsconfig.json --noEmit

      - name: Typecheck Video
        run: pnpm -C apps/video exec tsc -p tsconfig.json --noEmit

      - name: Package smoke (shared/audio/render/analytics)
        run: |
          pnpm -C packages/shared run smoke:stableStringify
          pnpm -C packages/audio run audio:smoke
          pnpm -C packages/render-orchestrator run render:smoke
          pnpm -C packages/analytics run analytics:smoke

      - name: Run fallback helper smoke
        run: pnpm -C apps/api run smoke:ui:fallback

      - name: Run 503 payload contract smoke
        run: pnpm -C apps/api run smoke:error-payload

      - name: Run benchmark refresh helper smoke
        run: pnpm -C apps/api run smoke:ui:benchmark-refresh

      - name: Run character action contract smoke
        run: pnpm -C apps/api run smoke:character-action-contracts

      - name: Start infra and migrate DB
        run: |
          pnpm docker:up
          pnpm -C packages/db migrate:deploy
          pnpm -C packages/db generate

      - name: Start API
        shell: bash
        run: |
          pnpm -C apps/api run dev > api.log 2>&1 &
          echo $! > api.pid

      - name: Wait for health
        shell: bash
        run: |
          for i in {1..90}; do
            if curl -fsS http://127.0.0.1:3000/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "API health timeout"
          exit 1

      - name: Smoke UI in DB-up mode
        run: pnpm smoke:ui:up

      - name: Smoke UI visual contract
        if: always()
        run: pnpm smoke:ui:visual

      - name: Capture UI snapshots in DB-up mode
        if: always()
        env:
          SMOKE_CAPTURE_LABEL: db-up
        run: pnpm smoke:ui:capture

      - name: Stop postgres for DB-down mode
        if: always()
        run: docker compose -f docker/docker-compose.yml stop postgres

      - name: Smoke UI in DB-down mode
        if: always()
        run: pnpm smoke:ui:down

      - name: Capture UI snapshots in DB-down mode
        if: always()
        env:
          SMOKE_CAPTURE_LABEL: db-down
        run: pnpm smoke:ui:capture

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-ui-resilience-logs-${{ github.run_id }}-${{ github.sha }}
          path: |
            api.log
            out/smoke_e2e_last.json
            out/ui_smoke_snapshots/**
          if-no-files-found: ignore

      - name: Stop API
        if: always()
        shell: bash
        run: |
          if [ -f api.pid ]; then
            kill "$(cat api.pid)" || true
          fi

      - name: Stop infra
        if: always()
        run: pnpm docker:down
